# Perfil de desenvolvimento com configurações mínimas
spring.application.name=GeoLimites-Dev
server.port=9010

# === LOGGING MÍNIMO ===
logging.level.org.springframework.security=WARN
logging.level.org.hibernate=WARN
logging.level.org.springframework=WARN
logging.level.com.momorialPro=INFO

# === DATABASE SIMPLES ===
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/geo_limites_db}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# === HIKARI SIMPLES ===
spring.datasource.hikari.maximum-pool-size=3
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-timeout=20000
spring.datasource.hikari.idle-timeout=300000

# === JPA SIMPLES ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true

# === DESABILITAR RECURSOS DESNECESSÁRIOS ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.jpa.open-in-view=false

# === JWT SIMPLES ===
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# === ADMIN BOOTSTRAP ===
memorialpro.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
memorialpro.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
memorialpro.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
memorialpro.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:Administrador GeoLimites}
memorialpro.auth.frontend-url=${APP_FRONTEND_URL:http://localhost:3004}
memorialpro.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3004,http://127.0.0.1:3004}

# === MULTIPART ===
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
