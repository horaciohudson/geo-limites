spring.application.name=GeoLimites
server.port=9010
server.forward-headers-strategy=framework

# === LOGGING ===
logging.file.name=logs/geolimites.log
logging.level.org.springframework.security=WARN
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN

# === DATABASE ===
spring.datasource.url=${DB_URL:jdbc:postgresql://localhost:5432/geo_limites_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true&failOverReadOnly=false&maxReconnects=10}
spring.datasource.username=${DB_USERNAME:postgres}
spring.datasource.password=${DB_PASSWORD:postgres}
spring.datasource.driver-class-name=org.postgresql.Driver

# === HIKARI CONNECTION POOL (Configuração ultra robusta) ===
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.maximum-pool-size=5
spring.datasource.hikari.minimum-idle=1
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=5000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.initialization-fail-timeout=1
spring.datasource.hikari.isolate-internal-queries=false
spring.datasource.hikari.allow-pool-suspension=false
spring.datasource.hikari.read-only=false
spring.datasource.hikari.register-mbeans=false

# === JPA / HIBERNATE ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# === CONFIGURAÇÕES PARA RESOLVER PROBLEMAS DE CONEXÃO ===
spring.jpa.properties.hibernate.connection.provider_disables_autocommit=false
spring.jpa.properties.hibernate.jdbc.batch_size=10
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=false
spring.jpa.properties.hibernate.connection.autocommit=true
# Configuração removida - duplicada

# === JACKSON / JSON ===

spring.jackson.deserialization.read-enums-using-to-string=true
spring.jackson.serialization.write-enums-using-to-string=true
spring.jackson.time-zone=UTC
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss'Z'

# === FLYWAY ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.validate-on-migrate=true
spring.flyway.locations=classpath:db/migration

# === JWT ===
jwt.secret=${JWT_SECRET}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# === ADMIN BOOTSTRAP ===
memorialpro.bootstrap.admin.enabled=${BOOTSTRAP_ADMIN_ENABLED:false}
memorialpro.bootstrap.admin.username=${BOOTSTRAP_ADMIN_USERNAME:}
memorialpro.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
memorialpro.bootstrap.admin.full-name=${BOOTSTRAP_ADMIN_FULL_NAME:Administrador GeoLimites}

# === AUTH / EMAIL VERIFICATION ===
memorialpro.auth.auto-verify-users=${AUTH_AUTO_VERIFY_USERS:false}
memorialpro.auth.verification-token-hours=${AUTH_VERIFICATION_TOKEN_HOURS:24}
memorialpro.auth.frontend-url=${APP_FRONTEND_URL:https://www.geolimites.com.br}
memorialpro.cors.allowed-origin-patterns=${CORS_ALLOWED_ORIGIN_PATTERNS:http://localhost:3004,http://127.0.0.1:3004,https://www.geolimites.com.br,https://geolimites.com.br}
geolimites.public-url=${PUBLIC_APP_URL:https://www.geolimites.com.br}

# === MAIL / SMTP ===
memorialpro.mail.enabled=${MAIL_ENABLED:false}
memorialpro.mail.from-address=${MAIL_FROM_ADDRESS:${MAIL_USERNAME:}}
memorialpro.mail.from-name=${MAIL_FROM_NAME:Geo Limites}
spring.mail.host=${MAIL_HOST:}
spring.mail.port=${MAIL_PORT:587}
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.protocol=${MAIL_PROTOCOL:smtp}
spring.mail.properties.mail.smtp.auth=${MAIL_AUTH:true}
spring.mail.properties.mail.smtp.starttls.enable=${MAIL_TLS:true}
spring.mail.properties.mail.smtp.ssl.enable=${MAIL_SSL:false}
spring.mail.properties.mail.smtp.connectiontimeout=${MAIL_CONNECTION_TIMEOUT:5000}
spring.mail.properties.mail.smtp.timeout=${MAIL_TIMEOUT:5000}
spring.mail.properties.mail.smtp.writetimeout=${MAIL_WRITE_TIMEOUT:5000}

# === MULTIPART / UPLOAD ===
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB
spring.servlet.multipart.enabled=true
memorialpro.storage.dxf-dir=${DXF_STORAGE_DIR:uploads/dxf}
memorialpro.storage.templates-dir=${TEMPLATES_STORAGE_DIR:templates}

# === CLAUDE (PROVIDER ATIVO) ===
memorialpro.claude.endpoint=https://api.anthropic.com/v1/messages
memorialpro.claude.api-key=${ANTHROPIC_API_KEY}
# Modelo padrao do provedor configurado
memorialpro.claude.model=${CLAUDE_MODEL:claude-3-haiku-20240307}
memorialpro.claude.max-tokens=${CLAUDE_MAX_TOKENS:8192}
memorialpro.claude.timeout=300000
memorialpro.claude.max-retries=3
memorialpro.claude.chunk-delay=${CLAUDE_CHUNK_DELAY:10000}

# === MEMORIAL PARTITIONING ===
memorialpro.memorial.partition.enabled=true
memorialpro.memorial.partition.threshold=15
memorialpro.memorial.partition.chunk-size=5
memorialpro.memorial.partition.overlap=1

# === CLAUDE PROMPT CACHING ===
memorialpro.claude.cache.enabled=true
memorialpro.claude.cache.ttl=300

# === FALLBACK ===
memorialpro.llm.fallback-enabled=false

# === OBSERVABILIDADE ===
logging.level.org.springdoc=INFO
logging.level.io.swagger.v3=INFO
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.com.momorialPro=INFO
