# Configuração ultra simples para fazer o backend funcionar
spring.application.name=GeoLimites-Simple
server.port=9010

# === BANCO H2 EM MEMÓRIA (TEMPORÁRIO) ===
spring.datasource.url=jdbc:h2:mem:testdb
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# === JPA SIMPLES ===
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect

# === DESABILITAR TUDO DESNECESSÁRIO ===
spring.flyway.enabled=false
spring.jpa.open-in-view=false

# === LOGS MÍNIMOS ===
logging.level.org.springframework=WARN
logging.level.org.hibernate=WARN
logging.level.com.momorialPro=INFO

# === JWT SIMPLES ===
jwt.secret=${JWT_SECRET:local-dev-insecure-jwt-secret-change-me-please-1234567890-abcdefghijklmnopqrstuvwxyz}
jwt.expiration=86400000
jwt.refresh.expiration=604800000

# === MULTIPART ===
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

# === HIKARI MÍNIMO ===
spring.datasource.hikari.maximum-pool-size=2
spring.datasource.hikari.minimum-idle=1
