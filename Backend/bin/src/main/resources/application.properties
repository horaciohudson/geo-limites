spring.application.name=GeoLimites
server.port=9010

# === LOGGING ===
logging.file.name=logs/geolimites.log
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=DEBUG
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=TRACE

# === DATABASE ===
spring.datasource.url=jdbc:postgresql://localhost:5432/memorial_pro
spring.datasource.username=postgres
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=org.postgresql.Driver
spring.datasource.hikari.connection-init-sql=SET NAMES 'UTF8'

# === JPA / HIBERNATE ===
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.enable_lazy_load_no_trans=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.type.preferred_instant_jdbc_type=TIMESTAMP
spring.jpa.properties.hibernate.jdbc.lob.non_contextual_creation=true
spring.jpa.properties.hibernate.temp.use_jdbc_metadata_defaults=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.hibernate.naming.physical-strategy=org.hibernate.boot.model.naming.PhysicalNamingStrategyStandardImpl

# === JACKSON / JSON ===
spring.jackson.time-zone=America/Sao_Paulo
spring.jackson.deserialization.read-enums-using-to-string=true
spring.jackson.serialization.write-enums-using-to-string=true
spring.mvc.format.date-time=yyyy-MM-dd'T'HH:mm:ss'Z'

# === FLYWAY ===
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=true
spring.flyway.locations=classpath:db/migration

# === JWT ===
jwt.secret=${JWT_SECRET}
jwt.expiration=3600000

# === OPENAI / LLM ===
memorialpro.llm.endpoint=https://api.openai.com/v1/chat/completions
memorialpro.llm.api-key=${OPENAI_API_KEY:}
memorialpro.llm.model=gpt-4o-mini

# === DEPURA��O ===
logging.level.org.springdoc=DEBUG
logging.level.io.swagger.v3=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.boot.autoconfigure=INFO
