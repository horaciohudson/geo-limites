<!DOCTYPE html>
<html>
<head>
    <title>Test Real DXF Data</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .section { margin: 20px 0; padding: 15px; border: 1px solid #ccc; }
        .data { background: #f5f5f5; padding: 10px; white-space: pre-wrap; font-family: monospace; max-height: 400px; overflow-y: auto; }
        .error { color: red; }
        .success { color: green; }
        .warning { color: orange; }
        button { padding: 10px 20px; margin: 5px; }
        .highlight { background: yellow; }
    </style>
</head>
<body>
    <h1>🧪 Test Real DXF Data - MemorialPro</h1>
    
    <div class="section">
        <h2>📊 Análise dos Arquivos DXF Reais</h2>
        <button onclick="analyzeRealDXF()">🔍 Analisar Estrutura</button>
        <div id="analysis-result" class="data"></div>
    </div>
    
    <div class="section">
        <h2>🎯 Coordenadas Encontradas</h2>
        <div id="coordinates-found" class="data"></div>
    </div>
    
    <div class="section">
        <h2>📝 Textos Encontrados</h2>
        <div id="texts-found" class="data"></div>
    </div>
    
    <div class="section">
        <h2>📍 Pontos Encontrados</h2>
        <div id="points-found" class="data"></div>
    </div>

    <script>
        async function analyzeRealDXF() {
            try {
                document.getElementById('analysis-result').innerHTML = 
                    '<div class="warning">⏳ Analisando arquivos DXF reais...</div>';
                
                // Testar ambos os arquivos
                const files = [
                    'TESTE AGENTE_DBL TERRA NOBRE_1.dxf',
                    'TESTE AGENTE_DBL TERRA NOBRE_2.dxf'
                ];
                
                let analysisHtml = '';
                let coordinatesHtml = '';
                let textsHtml = '';
                let pointsHtml = '';
                
                for (const fileName of files) {
                    analysisHtml += `\\n📁 ARQUIVO: ${fileName}\\n`;
                    analysisHtml += '='.repeat(50) + '\\n';
                    
                    try {
                        // Fazer requisição para o backend (simulando o que o sistema faz)
                        const response = await fetch(`/api/dxf/test/download?file=${encodeURIComponent(fileName)}`);
                        
                        if (!response.ok) {
                            analysisHtml += `❌ Erro HTTP: ${response.status}\\n`;
                            continue;
                        }
                        
                        const content = await response.text();
                        analysisHtml += `✅ Arquivo carregado: ${content.length} caracteres\\n`;
                        
                        // Analisar estrutura
                        const analysis = analyzeStructure(content, fileName);
                        analysisHtml += analysis.summary;
                        coordinatesHtml += analysis.coordinates;
                        textsHtml += analysis.texts;
                        pointsHtml += analysis.points;
                        
                    } catch (error) {
                        analysisHtml += `❌ Erro ao processar ${fileName}: ${error.message}\\n`;
                    }
                    
                    analysisHtml += '\\n';
                }
                
                document.getElementById('analysis-result').innerHTML = analysisHtml;
                document.getElementById('coordinates-found').innerHTML = coordinatesHtml;
                document.getElementById('texts-found').innerHTML = textsHtml;
                document.getElementById('points-found').innerHTML = pointsHtml;
                
            } catch (error) {
                document.getElementById('analysis-result').innerHTML = 
                    `<div class="error">❌ Erro geral: ${error.message}</div>`;
            }
        }
        
        function analyzeStructure(content, fileName) {
            const lines = content.split('\\n').map(line => line.trim());
            
            let summary = '';
            let coordinates = `\\n📁 ${fileName}:\\n`;
            let texts = `\\n📁 ${fileName}:\\n`;
            let points = `\\n📁 ${fileName}:\\n`;
            
            // Estatísticas gerais
            summary += `📏 Total de linhas: ${lines.length}\\n`;
            
            // Procurar seções
            const sectionsFound = [];
            for (let i = 0; i < lines.length - 1; i++) {
                if (lines[i] === '0' && lines[i + 1] === 'SECTION') {
                    for (let j = i + 2; j < Math.min(i + 10, lines.length - 1); j++) {
                        if (lines[j] === '2') {
                            sectionsFound.push(lines[j + 1]);
                            break;
                        }
                    }
                }
            }
            summary += `📂 Seções encontradas: ${sectionsFound.join(', ')}\\n`;
            
            // Contar entidades
            const entityCounts = {};
            const entityTypes = ['LINE', 'LWPOLYLINE', 'TEXT', 'MTEXT', 'POINT', 'CIRCLE', 'ARC'];
            
            for (const entityType of entityTypes) {
                let count = 0;
                for (let i = 0; i < lines.length - 1; i++) {
                    if (lines[i] === '0' && lines[i + 1] === entityType) {
                        count++;
                    }
                }
                if (count > 0) {
                    entityCounts[entityType] = count;
                }
            }
            
            summary += `🎯 Entidades encontradas:\\n`;
            Object.entries(entityCounts).forEach(([type, count]) => {
                summary += `   - ${type}: ${count}\\n`;
            });
            
            // Analisar coordenadas específicas
            const coordsAnalysis = analyzeCoordinatesInDetail(lines);
            coordinates += coordsAnalysis;
            
            // Analisar textos específicos
            const textsAnalysis = analyzeTextsInDetail(lines);
            texts += textsAnalysis;
            
            // Analisar pontos específicos
            const pointsAnalysis = analyzePointsInDetail(lines);
            points += pointsAnalysis;
            
            return {
                summary,
                coordinates,
                texts,
                points
            };
        }
        
        function analyzeCoordinatesInDetail(lines) {
            let analysis = '';
            let coordCount = 0;
            let minX = Infinity, maxX = -Infinity;
            let minY = Infinity, maxY = -Infinity;
            
            // Procurar por coordenadas (códigos 10, 20, 11, 21)
            for (let i = 0; i < lines.length - 1; i++) {
                const code = lines[i].trim();
                const value = lines[i + 1].trim();
                
                if (['10', '20', '11', '21'].includes(code)) {
                    const numValue = parseFloat(value);
                    if (!isNaN(numValue)) {
                        coordCount++;
                        if (code === '10' || code === '11') { // X coordinates
                            minX = Math.min(minX, numValue);
                            maxX = Math.max(maxX, numValue);
                        }
                        if (code === '20' || code === '21') { // Y coordinates
                            minY = Math.min(minY, numValue);
                            maxY = Math.max(maxY, numValue);
                        }
                    }
                }
            }
            
            analysis += `📐 Coordenadas analisadas: ${coordCount}\\n`;
            analysis += `📏 Limites X: ${minX.toFixed(2)} a ${maxX.toFixed(2)}\\n`;
            analysis += `📏 Limites Y: ${minY.toFixed(2)} a ${maxY.toFixed(2)}\\n`;
            analysis += `📐 Dimensões: ${(maxX - minX).toFixed(2)} x ${(maxY - minY).toFixed(2)}\\n`;
            
            return analysis;
        }
        
        function analyzeTextsInDetail(lines) {
            let analysis = '';
            let textCount = 0;
            const textSamples = [];
            
            for (let i = 0; i < lines.length - 1; i++) {
                if (lines[i] === '0' && lines[i + 1] === 'TEXT') {
                    textCount++;
                    
                    // Extrair informações do texto
                    let x = null, y = null, text = null, layer = null;
                    
                    for (let j = i + 2; j < Math.min(i + 50, lines.length - 1); j += 2) {
                        const code = lines[j];
                        const value = lines[j + 1];
                        
                        if (code === '0') break; // Próxima entidade
                        
                        switch (code) {
                            case '8': layer = value; break;
                            case '10': x = parseFloat(value); break;
                            case '20': y = parseFloat(value); break;
                            case '1': text = value; break;
                        }
                    }
                    
                    if (textSamples.length < 10) {
                        textSamples.push({
                            index: textCount,
                            x: x ? x.toFixed(2) : 'N/A',
                            y: y ? y.toFixed(2) : 'N/A',
                            text: text || 'N/A',
                            layer: layer || 'N/A'
                        });
                    }
                }
            }
            
            analysis += `📝 Total de textos: ${textCount}\\n`;
            analysis += `📋 Amostras (primeiros 10):\\n`;
            
            textSamples.forEach(sample => {
                analysis += `   ${sample.index}. "${sample.text}" em (${sample.x}, ${sample.y}) - Layer: ${sample.layer}\\n`;
            });
            
            return analysis;
        }
        
        function analyzePointsInDetail(lines) {
            let analysis = '';
            let pointCount = 0;
            const pointSamples = [];
            
            for (let i = 0; i < lines.length - 1; i++) {
                if (lines[i] === '0' && lines[i + 1] === 'POINT') {
                    pointCount++;
                    
                    // Extrair informações do ponto
                    let x = null, y = null, z = null, layer = null;
                    
                    for (let j = i + 2; j < Math.min(i + 30, lines.length - 1); j += 2) {
                        const code = lines[j];
                        const value = lines[j + 1];
                        
                        if (code === '0') break; // Próxima entidade
                        
                        switch (code) {
                            case '8': layer = value; break;
                            case '10': x = parseFloat(value); break;
                            case '20': y = parseFloat(value); break;
                            case '30': z = parseFloat(value); break;
                        }
                    }
                    
                    if (pointSamples.length < 10) {
                        pointSamples.push({
                            index: pointCount,
                            x: x ? x.toFixed(2) : 'N/A',
                            y: y ? y.toFixed(2) : 'N/A',
                            z: z ? z.toFixed(2) : 'N/A',
                            layer: layer || 'N/A'
                        });
                    }
                }
            }
            
            analysis += `📍 Total de pontos: ${pointCount}\\n`;
            analysis += `📋 Amostras (primeiros 10):\\n`;
            
            pointSamples.forEach(sample => {
                analysis += `   ${sample.index}. (${sample.x}, ${sample.y}, ${sample.z}) - Layer: ${sample.layer}\\n`;
            });
            
            return analysis;
        }
    </script>
</body>
</html>
